services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vjailbreak-backend
    env_file: .env
    environment:
      - CHROMA_PATH=/data/chroma
      - CONTEXT_PATH=/data/context.md
    volumes:
      - chroma-data:/data
    # Backend NOT exposed to host — only reachable via nginx on the internal network
    expose:
      - "8000"
    networks:
      - internal
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    image: nginx:alpine
    container_name: vjailbreak-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3000:80"
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # nginx needs to bind port 80
      - CHOWN             # nginx chowns temp dirs at startup
      - SETUID            # nginx drops to nginx user for workers
      - SETGID

networks:
  internal:
    driver: bridge
    internal: false   # allows backend to reach external URLs for crawling

volumes:
  chroma-data:
    driver: local

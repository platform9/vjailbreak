              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ProxyVMSpec defines the desired state of ProxyVM
            properties:
              vmName:
                description: VMName is the display name of the Proxy VM in vCenter.
                type: string
              vmwareCredsRef:
                description: VMwareCredsRef references the VMwareCreds used to locate
                  and connect to the Proxy VM.
                properties:

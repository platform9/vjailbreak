                  networkMappings:
                    description: NetworkMappings maps source networks to destination
                      networks.
                    items:
                      description: MigrationBucketMapping is a single source -> target
                        mapping (network or storage).
                      properties:
                        source:
                          type: string
                        target:
                          type: string
                      required:
                      - source
                      - target
                      type: object
                    type: array
                  pcdCluster:
                    description: PCDCluster is the destination PCD cluster.
                    type: string
                  securityGroups:
                    description: SecurityGroups is the list of OpenStack security
                      groups to apply.
                    items:
                      type: string
                    type: array
                  selectedOptions:
                    description: SelectedOptions records which optional migration-options
                      checkboxes were enabled.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  serverGroup:
                    description: ServerGroup is the OpenStack server group to place
                      VMs in.
                    type: string
                  sourceCluster:
                    description: SourceCluster is the VMware source cluster (derived
                      from the bucket's VMs).
                    type: string
                  storageMappings:
                    description: StorageMappings maps source datastores to destination
                      volume types.

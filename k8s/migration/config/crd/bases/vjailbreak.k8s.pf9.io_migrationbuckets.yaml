                type: boolean
              schedule:
                description: Schedule is an optional future time at which the bucket's
                  migration should start.
                format: date-time
                type: string
              vms:
                description: VMs is the list of member VM names. Must be non-empty.
                items:
                  type: string
                type: array
              vmwareCredsRef:
                description: VMwareCredsRef references the source VMware credential
                  this bucket belongs to.
                properties:
                  name:

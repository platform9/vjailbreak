                      description: MigrationBucketMapping is a single source -> target
                        mapping (network or storage).
                      properties:
                        source:
                          type: string
                        target:
                          type: string
                      required:
                      - source
                      - target
                      type: object
                    type: array
                type: object
              isDefault:

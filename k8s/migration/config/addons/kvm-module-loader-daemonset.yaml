apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kvm-module-loader
  namespace: migration-system
  labels:
    app: kvm-module-loader
spec:
  selector:
    matchLabels:
      app: kvm-module-loader
  template:
    metadata:
      labels:
        app: kvm-module-loader
    spec:
      automountServiceAccountToken: false
      # No nodeSelector: the DaemonSet runs on every node in the cluster.
      # This is intentional — when a new migration agent node joins, Kubernetes
      # automatically schedules this pod on it before any v2v-helper job can
      # land there, ensuring KVM is loaded regardless of when nodes are added.
      # modprobe is a no-op if the module is already loaded or the CPU vendor
      # does not support KVM, so running on non-migration nodes is harmless.
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      containers:
      - name: kvm-module-loader
        image: busybox:1.36
        command:
        - sh
        - -c
        - modprobe kvm-intel || modprobe kvm-amd || true; sleep infinity
        securityContext:
          privileged: true
        volumeMounts:
        - name: lib-modules
          mountPath: /lib/modules
          readOnly: true
      volumes:
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: Directory

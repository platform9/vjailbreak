apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vjailbreak-ui-cert
  namespace: migration-system
spec:
  secretName: vjailbreak-ui-tls
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-cluster-issuer
  commonName: "${PUBLIC_IP}"
  dnsNames:
  - "${PUBLIC_IP}.nip.io"
  ipAddresses:
  - "${PUBLIC_IP}"

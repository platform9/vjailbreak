apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: grafana-cert
  namespace: monitoring
spec:
  secretName: grafana-tls
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-cluster-issuer
  commonName: "${PUBLIC_IP}"
  dnsNames:
  - "${PUBLIC_IP}.nip.io"
  ipAddresses:
  - "${PUBLIC_IP}"


apiVersion: apps/v1
kind: Deployment
metadata:
  name: vjailbreak-ui
  namespace: migration-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vjailbreak-ui
  template:
    metadata:
      labels:
        app: vjailbreak-ui
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
      serviceAccountName: ui-manager-sa
      # Disable the default long-lived automounted SA token.
      # A projected token with a bounded TTL is mounted below instead.
      automountServiceAccountToken: false
      containers:
        - name: vjailbreak-ui-container
          image: quay.io/platform9/vjailbreak-ui:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
          - name: nginx-shadow-htpasswd
            mountPath: /etc/nginx/shadow
          - name: pf9-logs
            mountPath: /var/log/pf9
            readOnly: true
          - name: sa-token
            mountPath: /var/run/secrets/kubernetes.io/serviceaccount
            readOnly: true
      volumes:
      - name: nginx-shadow-htpasswd
        hostPath:
          path: /etc/htpasswd
          type: FileOrCreate
      - name: pf9-logs
        hostPath:
          path: /var/log/pf9
          type: DirectoryOrCreate
      - name: sa-token
        projected:
          sources:
          - serviceAccountToken:
              # Minimum: 600s (enforced by Kubernetes). Default: 86400s (24h).
              # To change TTL: update this value and roll the Deployment.
              # A pod restart is required for the new TTL to take effect.
              expirationSeconds: 86400
              path: token
          - configMap:
              name: kube-root-ca.crt
              items:
              - key: ca.crt
                path: ca.crt
          - downwardAPI:
              items:
              - path: namespace
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
---
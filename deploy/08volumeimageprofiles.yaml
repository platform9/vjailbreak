# VolumeImageProfile CRD and Default Profiles
# The default profiles (vjailbreak-default-windows, vjailbreak-default-linux) are managed
# by the VolumeImageProfile controller which seeds them at startup and protects them from deletion.
# However, this YAML provides the definitions for manual installation or reference.

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.1
  name: volumeimageprofiles.vjailbreak.k8s.pf9.io
spec:
  group: vjailbreak.k8s.pf9.io
  names:
    kind: VolumeImageProfile
    listKind: VolumeImageProfileList
    plural: volumeimageprofiles
    singular: volumeimageprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.osFamily
      name: OSFamily
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VolumeImageProfile is the Schema for the volumeimageprofiles API.
          It defines a reusable set of Cinder volume_image_metadata properties that can be
          applied to VM volumes during migration. Profiles are referenced from MigrationPlan
          and are merged in order to produce the final metadata applied to each migrated volume.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
            type: string
          metadata:
            type: object
          spec:
            description: VolumeImageProfileSpec defines the desired state of VolumeImageProfile
            properties:
              description:
                description: Description is an optional human-readable description of when to use this profile.
                type: string
              osFamily:
                description: |-
                  OSFamily scopes this profile to a specific OS type.
                  Use "windows" or "linux" to auto-apply to matching VMs, or "any" to apply regardless of OS.
                enum:
                - windows
                - linux
                - any
                type: string
              properties:
                additionalProperties:
                  type: string
                description: |-
                  Properties is the map of Cinder volume image metadata key-value pairs
                  that will be set on the migrated volume.
                type: object
            required:
            - osFamily
            - properties
            type: object
          status:
            description: VolumeImageProfileStatus defines the observed state of VolumeImageProfile
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---

# Default Windows Profile - seeded by controller on startup
apiVersion: vjailbreak.k8s.pf9.io/v1alpha1
kind: VolumeImageProfile
metadata:
  name: vjailbreak-default-windows
  namespace: migration-system
  annotations:
    description: Default profile for Windows VMs - enables QEMU guest agent and sets virtio drivers
spec:
  osFamily: windows
  description: Default Windows profile with virtio drivers and QEMU guest agent
  properties:
    hw_disk_bus: virtio
    hw_vif_model: virtio
    os_type: windows
    hw_qemu_guest_agent: "yes"
    hw_video_model: qxl

---

# Default Linux Profile - seeded by controller on startup
apiVersion: vjailbreak.k8s.pf9.io/v1alpha1
kind: VolumeImageProfile
metadata:
  name: vjailbreak-default-linux
  namespace: migration-system
  annotations:
    description: Default profile for Linux VMs - enables QEMU guest agent
spec:
  osFamily: linux
  description: Default Linux profile with QEMU guest agent enabled
  properties:
    hw_qemu_guest_agent: "yes"


apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vpwned-sdk
  name: migration-vpwned-sdk
  namespace: migration-system
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: vpwned-sdk
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: vpwned-sdk
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: pf9-env
            optional: true
        image: quay.io/platform9/vjailbreak-vpwned:main
        imagePullPolicy: IfNotPresent
        name: vpwned
        ports:
        - containerPort: 3001
          protocol: TCP
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsUser: 0
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/hosts
          name: hosts-file
          readOnly: true
        - mountPath: /home/ubuntu
          name: vddk-storage
        - mountPath: /run/dbus/system_bus_socket
          name: dbus-socket
        - mountPath: /etc/systemd/timesyncd.conf.d
          name: timesyncd-conf-dir
        - mountPath: /etc/localtime
          name: host-localtime
        - mountPath: /usr/share/zoneinfo
          name: host-zoneinfo
          readOnly: true
        - mountPath: /etc/pf9
          name: pf9-config
      dnsConfig:
        options:
        - name: ndots
          value: "1"
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccountName: migration-controller-manager
      terminationGracePeriodSeconds: 30
      volumes:
      - hostPath:
          path: /etc/hosts
          type: File
        name: hosts-file
      - hostPath:
          path: /home/ubuntu
          type: DirectoryOrCreate
        name: vddk-storage
      - hostPath:
          path: /run/dbus/system_bus_socket
          type: Socket
        name: dbus-socket
      - hostPath:
          path: /etc/systemd/timesyncd.conf.d
          type: DirectoryOrCreate
        name: timesyncd-conf-dir
      - hostPath:
          path: /etc/localtime
          type: FileOrCreate
        name: host-localtime
      - hostPath:
          path: /usr/share/zoneinfo
          type: Directory
        name: host-zoneinfo
      - hostPath:
          path: /etc/pf9
          type: Directory
        name: pf9-config
---
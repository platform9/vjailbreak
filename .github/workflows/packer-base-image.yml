name: Build Base Image

on:
  workflow_dispatch:
    inputs:
      k3s_version:
        description: 'K3s version to install'
        required: false
        type: string
        default: 'v1.31.4+k3s1'
      helm_version:
        description: 'Helm version to install'
        required: false
        type: string
        default: 'v3.16.3'

env:
  PACKER_VERSION: "latest"
  BASE_IMAGE_REPO: ${{ vars.REGISTRY || 'quay.io' }}/${{ vars.REPO || 'platform9' }}/vjailbreak
  BASE_IMAGE_TAG: "pre-bake-base-image"

jobs:
  build-base-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY || 'quay.io' }}
          username: ${{ secrets.QUAY_ROBOT_USERNAME }}
          password: ${{ secrets.QUAY_ROBOT_PASSWORD }}

      - name: Create base-images directory
        run: mkdir -p image_builder/base-images

      - name: Install containerd
        run: |
          sudo apt-get update
          sudo apt-get install -y containerd

      - name: Download base images
        run: |
          sudo chmod +x ./image_builder/scripts/download_base_images.sh
          sudo ./image_builder/scripts/download_base_images.sh

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up QEMU
        run: sudo apt-get install qemu-system qemu-utils -y

      - name: Setup packer
        uses: hashicorp/setup-packer@main
        id: setup
        with:
          version: ${{ env.PACKER_VERSION }}

      - name: Run packer init
        run: packer init ./image_builder/vjailbreak-base-image.pkr.hcl

      - name: Run packer validate
        run: |
          packer validate \
            -var "k3s_version=${{ github.event.inputs.k3s_version }}" \
            -var "helm_version=${{ github.event.inputs.helm_version }}" \
            ./image_builder/vjailbreak-base-image.pkr.hcl

      - name: Run packer build
        run: |
          PACKER_LOG=1 packer build \
            -var "k3s_version=${{ github.event.inputs.k3s_version }}" \
            -var "helm_version=${{ github.event.inputs.helm_version }}" \
            ./image_builder/vjailbreak-base-image.pkr.hcl

      - name: setup-oras
        uses: oras-project/setup-oras@v1.2.1

      - name: Upload base image to quay.io
        run: |
          oras push ${{ env.BASE_IMAGE_REPO }}:${{ env.BASE_IMAGE_TAG }} \
            --artifact-type="application/qcow2" \
            ./vjailbreak_base_qcow2/vjailbreak-base-image.qcow2

      - name: Upload base image artifact
        uses: actions/upload-artifact@v4
        with:
          name: vjailbreak-base-qcow2
          path: ./vjailbreak_base_qcow2/vjailbreak-base-image.qcow2

      - name: Print summary
        run: |
          echo "## Base Image Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image pushed to:** \`${{ env.BASE_IMAGE_REPO }}:${{ env.BASE_IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Versions" >> $GITHUB_STEP_SUMMARY
          echo "- K3s: ${{ github.event.inputs.k3s_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Helm: ${{ github.event.inputs.helm_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo "The main packer workflow will automatically use this base image." >> $GITHUB_STEP_SUMMARY
          echo "To download manually:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "oras pull ${{ env.BASE_IMAGE_REPO }}:${{ env.BASE_IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
